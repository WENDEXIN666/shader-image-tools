<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shader Image Tools</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container { max-width: 800px; margin: 50px auto; text-align: center; padding: 20px; }
        .loading { font-size: 24px; margin: 40px 0; }
        .spinner {
            width: 60px; height: 60px;
            border: 5px solid #333;
            border-top: 5px solid #4CAF50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error-box {
            background: rgba(244, 67, 54, 0.2);
            border: 2px solid #f44336;
            border-radius: 15px;
            padding: 30px;
            margin: 20px;
            text-align: center;
        }
        .error-box h2 { color: #f44336; margin-bottom: 20px; }
        .error-box p { margin: 10px 0; color: #ccc; }
        .retry-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            margin: 20px 10px;
        }
        .retry-btn:hover { background: #45a049; }
        .debug-info {
            background: #222;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            font-family: monospace;
            font-size: 12px;
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
        }
        #main-app { display: none; }
        #canvas-container { width: 100%; height: 60vh; display: flex; justify-content: center; align-items: center; }
        canvas { max-width: 100%; max-height: 100%; border-radius: 10px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); background: #000; }
        #controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(30, 30, 50, 0.95); padding: 20px 30px; border-radius: 15px;
            display: flex; gap: 15px; align-items: center; flex-wrap: wrap; justify-content: center;
        }
        #controls button {
            background: linear-gradient(135deg, #4CAF50, #45a049); color: white;
            border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-size: 14px;
        }
        #controls button:hover { transform: scale(1.05); }
        .upload-btn { background: linear-gradient(135deg, #2196F3, #1976D2) !important; }
        #file-input { display: none; }
        #status {
            position: fixed; top: 20px; right: 20px; background: rgba(30, 30, 50, 0.95);
            padding: 15px 20px; border-radius: 10px; font-size: 14px;
        }
        .filter-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="container">
            <div class="spinner"></div>
            <p class="loading">Loading Three.js Library...</p>
            <p style="color: #888; font-size: 14px;">This may take a few seconds. Please wait.</p>
            <div id="loading-status" style="color: #4CAF50; margin-top: 20px;">Initializing...</div>
        </div>
    </div>

    <div id="error-screen" style="display: none;">
        <div class="container">
            <div class="error-box">
                <h2>Failed to Load Three.js</h2>
                <p>Could not load the 3D library from CDN.</p>
                <p style="font-size: 12px; color: #888;">This might be a network issue or firewall blocking CDN requests.</p>
                <button class="retry-btn" onclick="retryLoad()">Retry</button>
                <button class="retry-btn" style="background: #2196F3;" onclick="tryGitHubCDN()">Try Alternative CDN</button>
            </div>
            <div class="debug-info" id="debug-log">
                <p>Debug information:</p>
                <p id="debug-text"></p>
            </div>
        </div>
    </div>

    <div id="main-app">
        <div id="status">Status: Ready</div>
        <div id="canvas-container">
            <canvas id="canvas" width="800" height="600"></canvas>
        </div>
        <div id="controls">
            <input type="file" id="file-input" accept="image/*" onchange="handleImageUpload(event)">
            <button class="upload-btn" onclick="document.getElementById('file-input').click()">Upload Image</button>
            <div class="filter-buttons">
                <button onclick="applyFilter('grayscale')">Grayscale</button>
                <button onclick="applyFilter('invert')">Invert</button>
                <button onclick="applyFilter('blur')">Blur</button>
                <button onclick="applyFilter('edge')">Edge</button>
                <button onclick="applyFilter('flip-h')">Flip H</button>
                <button onclick="applyFilter('flip-v')">Flip V</button>
            </div>
        </div>
    </div>

    <script>
        let loadAttempt = 0;
        const cdnList = [
            'https://unpkg.com/three@0.160.0/build/three.min.js',
            'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js',
            'https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js',
            'https://esm.sh/three@0.160.0'
        ];

        function log(msg) {
            console.log('[Load]', msg);
            const status = document.getElementById('loading-status');
            const debug = document.getElementById('debug-text');
            if (status) status.textContent = msg;
            if (debug) debug.innerHTML += '<br>' + msg;
        }

        function showError(msg) {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('error-screen').style.display = 'block';
            log('ERROR: ' + msg);
        }

        function showApp() {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            log('Three.js loaded successfully!');
            startApp();
        }

        function loadCDN(url, timeout = 10000) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = url;
                script.onload = () => resolve();
                script.onerror = () => reject(new Error('Failed'));
                
                const timer = setTimeout(() => {
                    script.remove();
                    reject(new Error('Timeout'));
                }, timeout);
                
                script.onload = () => { clearTimeout(timer); resolve(); };
                script.onerror = () => { clearTimeout(timer); reject(new Error('Failed')); };
                
                document.head.appendChild(script);
            });
        }

        async function tryCDN(index) {
            if (index >= cdnList.length) {
                throw new Error('All CDNs failed');
            }
            
            const url = cdnList[index];
            log('Trying CDN ' + (index + 1) + ': ' + url.split('/')[2]);
            
            try {
                await loadCDN(url, 15000);
                log('SUCCESS: Loaded from ' + url.split('/')[2]);
                return true;
            } catch (e) {
                log('Failed: ' + e.message);
                return tryCDN(index + 1);
            }
        }

        async function init() {
            log('Starting initialization...');
            log('User Agent: ' + navigator.userAgent.substring(0, 50));
            
            try {
                await tryCDN(0);
                showApp();
            } catch (e) {
                showError(e.message);
            }
        }

        function retryLoad() {
            loadAttempt++;
            log('Retry attempt #' + loadAttempt);
            document.getElementById('error-screen').style.display = 'none';
            document.getElementById('loading-screen').style.display = 'block';
            init();
        }

        function tryGitHubCDN() {
            const url = 'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r160/build/three.min.js';
            log('Trying jsdelivr CDN...');
            const script = document.createElement('script');
            script.src = url;
            script.onload = () => {
                log('SUCCESS via jsdelivr');
                showApp();
            };
            script.onerror = () => showError('GitHub CDN also failed');
            document.head.appendChild(script);
        }

        function startApp() {
            let scene, camera, renderer, mesh;
            let currentTexture = null;
            let uniforms = null;

            scene = new THREE.Scene();
            camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 10);
            camera.position.z = 1;

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true });
            renderer.setSize(800, 600);

            uniforms = { uTexture: { value: null }, uFilterType: { value: 0 }, uBlurAmount: { value: 0.5 } };

            const material = new THREE.ShaderMaterial({
                uniforms: uniforms,
                vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
                fragmentShader: `
                    uniform sampler2D uTexture; uniform int uFilterType; uniform float uBlurAmount; varying vec2 vUv;
                    void main() {
                        if (uFilterType == 0 || uTexture == null) { gl_FragColor = vec4(0.12, 0.12, 0.18, 1.0); return; }
                        vec4 color = texture2D(uTexture, vUv);
                        if (uFilterType == 1) { float gray = dot(color.rgb, vec3(0.299, 0.587, 0.114)); gl_FragColor = vec4(gray, gray, gray, 1.0); }
                        else if (uFilterType == 2) { gl_FragColor = vec4(1.0 - color.rgb, 1.0); }
                        else if (uFilterType == 4) { vec4 sum = vec4(0.0); float blur = 0.01 + uBlurAmount * 0.02; for(float x = -2.0; x <= 2.0; x++) { for(float y = -2.0; y <= 2.0; y++) { sum += texture2D(uTexture, vUv + vec2(x, y) * blur); } } gl_FragColor = sum / 25.0; }
                        else if (uFilterType == 5) { vec4 r = texture2D(uTexture, vUv + vec2(0.005, 0.0)); vec4 l = texture2D(uTexture, vUv + vec2(-0.005, 0.0)); vec4 t = texture2D(uTexture, vUv + vec2(0.0, 0.005)); vec4 b = texture2D(uTexture, vUv + vec2(0.0, -0.005)); gl_FragColor = vec4((abs(r - l) + abs(t - b)).rgb * 3.0, 1.0); }
                        else if (uFilterType == 6) { gl_FragColor = texture2D(uTexture, vec2(1.0 - vUv.x, vUv.y)); }
                        else if (uFilterType == 7) { gl_FragColor = texture2D(uTexture, vec2(vUv.x, 1.0 - vUv.y)); }
                        else { gl_FragColor = color; }
                    }
                `
            });

            mesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material);
            scene.add(mesh);

            function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
            animate();

            window.handleImageUpload = function(event) {
                const file = event.target.files[0];
                if (!file) return;
                document.getElementById('status').textContent = 'Status: Loading...';
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width; canvas.height = img.height;
                        canvas.getContext('2d').drawImage(img, 0, 0);
                        const texture = new THREE.CanvasTexture(canvas);
                        texture.minFilter = THREE.LinearFilter;
                        if (currentTexture) currentTexture.dispose();
                        currentTexture = texture;
                        uniforms.uTexture.value = texture;
                        uniforms.uFilterType.value = 1;
                        document.getElementById('status').textContent = 'Status: Image loaded';
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            };

            window.applyFilter = function(filterType) {
                const map = { 'grayscale': 1, 'invert': 2, 'blur': 4, 'edge': 5, 'flip-h': 6, 'flip-v': 7 };
                if (!currentTexture) { document.getElementById('status').textContent = 'Status: Upload image first'; return; }
                if (map[filterType]) { uniforms.uFilterType.value = map[filterType]; document.getElementById('status').textContent = 'Filter: ' + filterType; }
            };

            document.getElementById('status').textContent = 'Status: Ready - Upload an image';
        }

        init();
    </script>
</body>
</html>
